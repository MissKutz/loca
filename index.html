<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choisir son trajet</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Variables */
    :root {
      --primary: #4facfe;
      --secondary: #00f2fe;
      --dark: #1a1a2e;
      --text: #333;
      --text-light: #666;
      --bg: #f5f7fa;
      --white: #fff;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 30px rgba(0,0,0,0.15);
      --radius: 12px;
      --max-width: 1100px;
    }

    /* Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    h1, h2, h3 { font-weight: 600; }
    a { text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 20px;
    }

    section { padding: 60px 0; }
    section h2 { margin-bottom: 30px; text-align: center; }
  </style>
</head>
<body>
  <header style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--white);">
  <div class="container">
    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0;">
      <h2 style="font-size: 1.5rem;">🌍 Explore</h2>
      <div>
        <a href="#" style="color: var(--white); margin: 0 12px; font-weight: 500;">Accueil</a>
        <a href="#destinations" style="color: var(--white); margin: 0 12px; font-weight: 500;">Destinations</a>
        <a href="#contact" style="color: var(--white); margin: 0 12px; font-weight: 500;">Contact</a>
      </div>
    </nav>
    <div class="hero" style="text-align: center; padding: 80px 0;">
      <h1 style="font-size: 3rem; margin-bottom: 10px;">Découvrez le monde</h1>
      <p style="font-size: 1.2rem; margin-bottom: 25px;">Voyagez et explorez de nouveaux horizons</p>
      <a href="#destinations" style="display: inline-block; background: var(--white); color: var(--primary); padding: 12px 30px; border-radius: 30px; font-weight: 600;">Commencer</a>
    </div>
  </div>
</header>
</body>
</html>
